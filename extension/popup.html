<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: Inter, system-ui, sans-serif;
      background: #07070f;
      color: #eeeeff;
      padding: 20px 16px;
    }
    .logo {
      font-size: 17px; font-weight: 900; letter-spacing: -.3px;
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }
    .sub { font-size: 11px; color: #7878a0; margin-bottom: 18px; }
    label { font-size: 11px; color: #7878a0; display: block; margin-bottom: 4px; margin-top: 10px; }
    input[type="email"], input[type="password"] {
      width: 100%; background: #17172a; border: 1px solid #28283f;
      color: #eeeeff; padding: 8px 10px; border-radius: 6px;
      font-size: 12px; outline: none;
    }
    input:focus { border-color: #7c3aed; }
    button {
      width: 100%; margin-top: 14px; padding: 10px;
      background: linear-gradient(135deg, #7c3aed, #0891b2);
      border: none; border-radius: 6px; color: #fff;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    button:hover { opacity: .9; }
    .status { font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
    .ok  { color: #10b981; }
    .err { color: #ef4444; }
    .warn { color: #f59e0b; }
    .divider { border: none; border-top: 1px solid #28283f; margin: 14px 0; }
    .counter {
      font-size: 11px; color: #7878a0; text-align: center;
      background: #17172a; border-radius: 6px; padding: 8px;
      margin-bottom: 12px;
    }
    .counter strong { color: #eeeeff; font-size: 20px; display: block; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      background: #17172a; border: 1px solid #28283f;
      border-radius: 6px; padding: 10px 12px;
    }
    .toggle-label { font-size: 12px; color: #c4c4e0; line-height: 1.3; }
    .toggle-label small { display: block; font-size: 10px; color: #7878a0; margin-top: 2px; }
    .switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #28283f;
      border-radius: 20px; cursor: pointer; transition: .2s;
    }
    .slider:before {
      content: ''; position: absolute;
      width: 14px; height: 14px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%; transition: .2s;
    }
    input:checked + .slider { background: #7c3aed; }
    input:checked + .slider:before { transform: translateX(16px); }
  </style>
</head>
<body>
  <div class="logo">📊 StudyBI</div>
  <div class="sub">Integração QConcursos</div>

  <label>E-mail</label>
  <input type="email" id="email" placeholder="seu@email.com">

  <label>Senha</label>
  <input type="password" id="pass" placeholder="••••••••">

  <button id="btn">Conectar</button>
  <div class="status" id="status"></div>

  <hr class="divider">

  <div class="counter">
    <strong id="count">—</strong>
    questões registradas hoje
  </div>

  <label>Disciplina</label>
  <input type="text" id="disc" placeholder="ex: Português">

  <label>Matéria</label>
  <input type="text" id="mat" placeholder="ex: Ortografia">

  <button id="btnSaveDisc" style="margin-top:10px;background:#17172a;border:1px solid #7c3aed;color:#a78bfa;font-weight:600">Salvar disciplina/matéria</button>
  <div class="status" id="discStatus"></div>

  <hr class="divider">

  <div class="toggle-row">
    <div class="toggle-label">
      📇 Salvar como flashcard
      <small>Frente: questão · Verso: gabarito</small>
    </div>
    <label class="switch">
      <input type="checkbox" id="flashcardToggle">
      <span class="slider"></span>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
